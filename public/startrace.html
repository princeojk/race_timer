<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RACEAPP</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" defer src="startrace.mjs"></script>
    <script type="module" defer src="customTimer.js"></script>
</head>
<body>
    <section id="layout">
        <section id="header">
            <h1>Race Tracker</h1>
        </section>
        <section id="center">
            <section class="timersection">
                <custom-timer id="timer"></custom-timer>
                <input type="submit" id="stopTimer" value="Stop">
                <input type="submit" id="startTimer" value="Start">
                <input type="submit" id="lap" value="Lap">
            </section>
            <section class="recordfinish">
                <input type="text" id="playerID" class="textInput" placeholder="Enter runners ID">
                <input type="submit" id="completed" value="Finished">
            </section>
        </section>
        <section id="footer">item 3</section>
        </section>
    </section>
</body>
</html>
