<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RACEAPP</title>
    <link rel="stylesheet" href="../style.css">
    <script type="module" defer src="/scripts/startrace.mjs"></script>
    <script type="module" defer src="/scripts/customplayerdisplay.js"></script>
    <script type="module" defer src="/scripts/customclock.mjs"></script>
    <script type="module" src="/scripts/main.mjs"></script>
</head>
<body>
        <header>
            <h1>Race Tracker</h1>
        </header>
        <main class="gap">
            <section class="timersection">
                <custom-timer id="timer"></custom-timer>
                <input type="submit" id="startTimer" value="Start">
                <input type="submit" id="lap" value="Lap">
                <input type="submit" id="stopTimer" value="End race">
                <custom-display id="lapTime"></custom-display>
            </section>
            <section class="recordfinish">
                <section>
                    <p>Player ID</p>
                    <input type="number" id="playerID" class="textInput" placeholder="Enter runners ID">
                </section>
                <section>
                    <p>Runners position</p>
                    <input type="number" id="positionID" class="textInput" placeholder="Enter position">
                </section>
                <input type="submit" id="completed" value="Submit">
                <input type="submit" id="results" value="Results">
                <custom-display id="saveplayer"></custom-display>
            </section>
        </main>
        <footer>item 3</footer>
        </section>
</body>
</html>
